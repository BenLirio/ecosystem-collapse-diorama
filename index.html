<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecosystem Collapse Diorama</title>
  <meta property="og:title" content="Ecosystem Collapse Diorama">
  <meta property="og:description" content="A tiny procedural ecosystem lives in your browser — watch herbivores graze, predators hunt, plants grow, and weather shift. Introduce your own custom organisms and watch chaos unfold.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://benlirio.com/ecosystem-collapse-diorama/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <script src="feedback.js" defer></script>
</head>
<body>
  <div id="app">
    <header id="hud">
      <div id="hud-left">
        <span id="clock">00:00</span>
        <span id="weather-label">☀ Clear</span>
      </div>
      <div id="hud-center">
        <span id="app-title">ECOSYSTEM COLLAPSE DIORAMA</span>
      </div>
      <div id="hud-right">
        <span id="pop-counts"></span>
      </div>
    </header>

    <div id="canvas-wrap">
      <canvas id="world"></canvas>
      <div id="report-overlay" style="display:none">
        <div id="report-card">
          <div id="report-stamp">FIELD REPORT</div>
          <div id="report-time"></div>
          <div id="report-title"></div>
          <div id="report-body"></div>
          <button id="report-dismiss">continue observing →</button>
        </div>
      </div>
    </div>

    <footer id="controls">
      <button id="btn-reset" title="Reset ecosystem">↺ Reset</button>
      <label id="speed-wrap">
        Speed
        <input type="range" id="speed-slider" min="0.5" max="3" step="0.5" value="1">
        <span id="speed-val">1×</span>
      </label>
      <button id="btn-add-organism" title="Introduce a new organism">+ Organism</button>
      <button id="btn-snapshot" title="Save nature report as image">📷 Snapshot</button>
    </footer>

    <!-- Add Organism Modal -->
    <div id="add-organism-overlay">
      <div id="add-organism-modal" role="dialog" aria-labelledby="org-modal-title">
        <div id="org-stamp">NEW SPECIES</div>
        <h2 id="org-modal-title">Introduce an Organism</h2>
        <p class="org-hint">Describe it in plain language. The ecosystem will interpret your rules.</p>

        <label class="org-label" for="org-name-input">Name</label>
        <input id="org-name-input" type="text" maxlength="24" placeholder="e.g. Gloom Stalker" autocomplete="off">

        <label class="org-label" for="org-desc-input">Description &amp; Rules</label>
        <textarea id="org-desc-input" maxlength="400" placeholder="e.g. A giant slow blue predator that hunts herbivores. Rare, solitary, efficient metabolism."></textarea>

        <div id="org-gen-result"></div>

        <div id="org-actions">
          <button id="org-cancel">Cancel</button>
          <button id="org-preview">Preview Rules</button>
          <button id="org-release" class="primary">Release into Ecosystem</button>
        </div>
      </div>
    </div>

    <div id="share" style="display:none">
      <button onclick="share()">Share your result!</button>
    </div>
  </div>
</body>
</html>
